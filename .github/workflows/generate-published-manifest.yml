name: Generate published thumbnails manifest

on:
  push:
    paths:
      - "published-thumbnails/**"
      - "!published-thumbnails/manifest.json"
      - ".github/workflows/generate-published-manifest.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        shell: bash
        run: |
          git clone --depth 1 --branch "${GITHUB_REF_NAME}" "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo

      - name: Generate manifest.json
        shell: python
        working-directory: repo
        run: |
          import json
          import re
          from pathlib import Path

          folder = Path("published-thumbnails")
          manifest_path = folder / "manifest.json"
          image_extensions = {".jpg", ".jpeg", ".png", ".webp", ".gif"}
          existing_by_image = {}

          def make_title(path):
              name = path.stem
              name = re.sub(r"[-_]+", " ", name)
              name = re.sub(r"\s+", " ", name).strip()
              return name.title() or "Yeni Kapak"

          if manifest_path.exists():
              try:
                  existing = json.loads(manifest_path.read_text(encoding="utf-8"))
                  if isinstance(existing, list):
                      existing_by_image = {
                          item.get("image"): item
                          for item in existing
                          if isinstance(item, dict) and item.get("image")
                      }
              except json.JSONDecodeError:
                  existing_by_image = {}

          items = []
          if folder.exists():
              for path in sorted(folder.iterdir(), key=lambda item: item.name.lower()):
                  if path.is_file() and path.suffix.lower() in image_extensions:
                      image_path = path.as_posix()
                      previous = existing_by_image.get(image_path, {})
                      item = {
                          "title": previous.get("title") or make_title(path),
                          "image": image_path
                      }
                      for key in ("duration", "views", "dateText"):
                          if previous.get(key):
                              item[key] = previous[key]
                      items.append(item)

          folder.mkdir(exist_ok=True)
          manifest_path.write_text(
              json.dumps(items, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8"
          )

      - name: Commit manifest changes
        shell: bash
        working-directory: repo
        run: |
          if git diff --quiet -- published-thumbnails/manifest.json; then
            echo "manifest.json is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add published-thumbnails/manifest.json
          git commit -m "Update published thumbnails manifest"
          git push
